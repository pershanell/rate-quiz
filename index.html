<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rate of Reaction — Factor Sort</title>
<style>
  :root{
    --navy:#0B2545;
    --navy-light:#13355e;
    --teal:#0F7C82;
    --teal-light:#149ba1;
    --gold:#D4A72C;
    --cream:#F7F5F0;
    --red:#C0392B;
    --green:#1E8449;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Calibri','Segoe UI',Arial,sans-serif;
    background:linear-gradient(180deg,var(--navy) 0%, var(--navy-light) 100%);
    min-height:100vh;
    color:var(--cream);
    padding:20px;
  }
  .wrap{max-width:760px;margin:0 auto;}
  header{text-align:center;margin-bottom:18px;}
  h1{color:var(--gold);font-size:1.8rem;margin:0 0 4px;letter-spacing:.5px;}
  .sub{color:var(--teal-light);font-size:.95rem;margin:0;}
  .progress-row{display:flex;align-items:center;gap:12px;margin:16px 0;}
  .bar-track{flex:1;height:10px;background:rgba(255,255,255,.12);border-radius:6px;overflow:hidden;}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));width:0%;transition:width .4s ease;}
  .stat{font-size:.85rem;color:var(--cream);white-space:nowrap;}
  .card{
    background:var(--cream);
    color:var(--navy);
    border-radius:14px;
    padding:28px 24px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
    border-left:8px solid var(--gold);
    min-height:110px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:1.15rem;
    font-weight:600;
    line-height:1.4;
  }
  .zones{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:20px;}
  .zone{
    padding:18px 8px;
    border-radius:10px;
    border:2px solid var(--teal);
    background:rgba(15,124,130,.15);
    color:var(--cream);
    font-weight:700;
    font-size:1rem;
    cursor:pointer;
    transition:transform .15s ease, background .15s ease;
    text-align:center;
  }
  .zone:hover{background:rgba(15,124,130,.35);transform:translateY(-2px);}
  .zone:active{transform:translateY(0);}
  .zone.correct{background:var(--green);border-color:var(--green);color:#fff;}
  .zone.incorrect{background:var(--red);border-color:var(--red);color:#fff;}
  .feedback{
    margin-top:16px;
    padding:14px 16px;
    border-radius:10px;
    font-size:.95rem;
    line-height:1.5;
    display:none;
  }
  .feedback.show{display:block;}
  .feedback.ok{background:rgba(30,132,73,.2);border:1px solid var(--green);}
  .feedback.bad{background:rgba(192,57,43,.2);border:1px solid var(--red);}
  .next-btn{
    margin-top:16px;
    background:var(--gold);
    color:var(--navy);
    border:none;
    padding:12px 26px;
    border-radius:8px;
    font-weight:700;
    font-size:1rem;
    cursor:pointer;
    display:none;
  }
  .next-btn.show{display:inline-block;}
  .next-btn:hover{filter:brightness(1.08);}
  .done{
    text-align:center;
    padding:40px 20px;
    background:var(--cream);
    color:var(--navy);
    border-radius:14px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
  }
  .done h2{color:var(--teal);margin-top:0;}
  .done .score{font-size:2.4rem;color:var(--gold);font-weight:800;margin:10px 0;}
  .restart{
    margin-top:14px;background:var(--teal);color:#fff;border:none;padding:10px 22px;
    border-radius:8px;font-weight:700;cursor:pointer;font-size:.95rem;
  }
  .retry-flag{
    display:inline-block;background:var(--red);color:#fff;font-size:.7rem;
    padding:3px 8px;border-radius:12px;margin-bottom:10px;font-weight:700;letter-spacing:.5px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Factor Sort: Rate of Reaction</h1>
    <p class="sub">Read each scenario. Decide the effect on reaction rate.</p>
  </header>

  <div class="progress-row">
    <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
    <div class="stat" id="statText">0 / 12 correct</div>
  </div>

  <div id="gameArea"></div>
</div>

<script>
const scenarios = [
  {text:"The temperature of the reacting solution is increased from 20°C to 40°C.", answer:"faster", explanation:"Higher temperature gives particles more kinetic energy, so they collide more often and more collisions exceed the activation energy."},
  {text:"The concentration of hydrochloric acid reacting with magnesium is halved.", answer:"slower", explanation:"Lower concentration means fewer particles per unit volume, so the frequency of successful collisions decreases."},
  {text:"A catalyst is added to the reaction mixture.", answer:"faster", explanation:"A catalyst provides an alternative pathway with lower activation energy, so more collisions are successful."},
  {text:"Marble chips are used instead of powdered marble, with the same mass.", answer:"slower", explanation:"Chips have less surface area than powder, so fewer particles are exposed for collisions."},
  {text:"The gas pressure in a reaction between two gases is increased.", answer:"faster", explanation:"Increasing pressure squeezes gas particles closer together, increasing collision frequency."},
  {text:"The reaction mixture is diluted with extra water.", answer:"slower", explanation:"Dilution lowers the concentration of reacting particles, reducing collision frequency."},
  {text:"The reaction is cooled in an ice bath before starting.", answer:"slower", explanation:"Lower temperature means particles have less kinetic energy, so fewer collisions have enough energy to react."},
  {text:"Powdered calcium carbonate is used instead of large lumps, same mass.", answer:"faster", explanation:"Powder has a much greater surface area, exposing more particles for collision."},
  {text:"An inhibitor is added to the reaction mixture.", answer:"slower", explanation:"An inhibitor interferes with the reaction pathway, reducing the rate of successful collisions."},
  {text:"Marble chips reacting with acid are stirred continuously instead of left still.", answer:"faster", explanation:"Stirring constantly moves fresh, more concentrated acid onto the surface of the solid and sweeps away product that would otherwise build up around it — so collisions stay frequent instead of slowing as a local layer of lower concentration forms around the solid."},
  {text:"The size of the container is increased but the same amount of gas is kept inside.", answer:"slower", explanation:"A bigger container at the same amount of gas lowers the concentration (particles per unit volume), reducing collision frequency."},
  {text:"The light in the room is switched off during a non-photochemical reaction.", answer:"none", explanation:"Light intensity has no effect unless the reaction is specifically light-sensitive (photochemical)."}
];

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
let queue = shuffle(scenarios.map((s,i)=>({...s, id:i})));
let totalUnique = queue.length;
let correctCount = 0;
let retryCount = 0;
let current = null;
let awaitingNext = false;

const gameArea = document.getElementById('gameArea');
const barFill = document.getElementById('barFill');
const statText = document.getElementById('statText');

function updateProgress(){
  const pct = Math.round((correctCount/totalUnique)*100);
  barFill.style.width = pct + '%';
  statText.textContent = `${correctCount} / ${totalUnique} correct`;
}

function retryFeedback(retries, total){
  if(retries===0) return "Perfect run — every scenario sorted correctly first time. Excellent recall of the rate factors.";
  const ratio = retries/total;
  if(ratio <= 0.25) return `Needed ${retries} repeat${retries===1?'':'s'} out of ${total} scenarios — solid understanding overall, just a couple of factors to double check.`;
  if(ratio <= 0.6) return `Needed ${retries} repeats out of ${total} scenarios — a fair few factors are still mixing up. Worth revisiting which changes speed up vs slow down a reaction.`;
  return `Needed ${retries} repeats out of ${total} scenarios — this topic needs more review before moving on. Go back over collision theory and how each factor affects collision frequency.`;
}

function render(){
  if(queue.length === 0){
    gameArea.innerHTML = `
      <div class="done">
        <h2>Round Complete!</h2>
        <div class="score">${totalUnique} / ${totalUnique}</div>
        <p>${retryFeedback(retryCount, totalUnique)}</p>
        <button class="restart" onclick="restart()">Play Again</button>
      </div>`;
    return;
  }
  current = queue[0];
  const isRetry = current._retry === true;
  gameArea.innerHTML = `
    ${isRetry ? '<div class="retry-flag">RETRY THIS ONE</div><br>' : ''}
    <div class="card">${current.text}</div>
    <div class="zones">
      <div class="zone" data-choice="faster">FASTER</div>
      <div class="zone" data-choice="slower">SLOWER</div>
      <div class="zone" data-choice="none">NO EFFECT</div>
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn">Next →</button>
  `;
  document.querySelectorAll('.zone').forEach(z=>{
    z.addEventListener('click', onChoose);
  });
  document.getElementById('nextBtn').addEventListener('click', goNext);
}

function onChoose(e){
  if(awaitingNext) return;
  awaitingNext = true;
  const choice = e.currentTarget.dataset.choice;
  const zones = document.querySelectorAll('.zone');
  const fb = document.getElementById('feedback');
  const correct = choice === current.answer;

  zones.forEach(z=>{
    z.style.pointerEvents='none';
    if(z.dataset.choice === current.answer) z.classList.add('correct');
    else if(z.dataset.choice === choice && !correct) z.classList.add('incorrect');
  });

  fb.classList.add('show', correct ? 'ok':'bad');
  fb.textContent = current.explanation;

  if(correct){
    correctCount++;
    queue.shift();
  } else {
    retryCount++;
    queue.shift();
    const wrongItem = {...current, _retry:true};
    const insertAt = Math.min(2, queue.length);
    queue.splice(insertAt, 0, wrongItem);
  }
  updateProgress();
  document.getElementById('nextBtn').classList.add('show');
}

function goNext(){
  awaitingNext = false;
  render();
}

function restart(){
  queue = shuffle(scenarios.map((s,i)=>({...s, id:i})));
  correctCount = 0;
  retryCount = 0;
  updateProgress();
  render();
}

updateProgress();
render();
</script>
</body>
</html>
